{% extends "base.html" %}

{% block title %}
Edit Event
{% endblock %}

{% block content %}
<h2>Edit Event</h2>

<form method="POST">

    <label>Title:</label><br>
    <input type="text" name="title" value="{{ event.title }}"><br><br>

    <label>Date:</label><br>
    <input type="date" name="date" value="{{ event.date }}"><br><br>

    <label>Start time:</label><br>
    <input type="time" name="start_time" value="{{ event.start_time }}"><br><br>

    <label>End time:</label><br>
    <input type="time" name="end_time" value="{{ event.end_time }}"><br><br>

    <label>Description:</label><br>
    <textarea name="description">{{ event.description }}</textarea><br><br>

    <button type="submit">Save changes</button>

</form>
{% endblock %}
